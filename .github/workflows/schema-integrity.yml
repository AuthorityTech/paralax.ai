name: Schema Integrity

on:
  push:
    branches: [main]
    paths:
      - 'src/lib/geo-schema.ts'
      - 'src/app/layout.tsx'
      - 'src/app/blog/**/page.tsx'
      - 'package.json'
      - 'package-lock.json'
      - 'packages/**'
      - 'src/app/page.tsx'
      - 'scripts/validate-live-schema.mjs'
      - 'scripts/schema-vocab-cache.json'
      - '.github/workflows/schema-integrity.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/lib/geo-schema.ts'
      - 'src/app/layout.tsx'
      - 'src/app/blog/**/page.tsx'
      - 'package.json'
      - 'package-lock.json'
      - 'packages/**'
      - 'src/app/page.tsx'
      - 'scripts/validate-live-schema.mjs'
      - 'scripts/schema-vocab-cache.json'
      - '.github/workflows/schema-integrity.yml'

concurrency:
  group: schema-integrity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  schema-integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Source guard — package dependency
        run: |
          node -e "
            const pkg = require('./package.json');
            const deps = { ...pkg.dependencies, ...pkg.devDependencies };
            if (!deps['@editorialkit/schema']) {
              console.error('FAIL: @editorialkit/schema is missing from package.json dependencies');
              process.exit(1);
            }
            console.log('PASS: @editorialkit/schema found in dependencies');
          "

      - name: Source guard — geo-schema imports @editorialkit/schema
        run: |
          if ! grep -q '@editorialkit/schema' src/lib/geo-schema.ts; then
            echo "FAIL: src/lib/geo-schema.ts does not import from @editorialkit/schema"
            exit 1
          fi
          echo "PASS: src/lib/geo-schema.ts imports from @editorialkit/schema"

      - name: Full build
        run: npm run build

      - name: Schema type validation (served build vs schema.org)
        run: |
          npm start &
          SERVER_PID=$!
          echo "Waiting for server on :3000..."
          for i in $(seq 1 30); do
            curl -sf -m 2 http://localhost:3000/ -o /dev/null && { echo "ready after ${i}s"; break; }
            sleep 1
          done
          node scripts/validate-live-schema.mjs --site paralax.ai --base http://localhost:3000
          CODE=$?
          kill $SERVER_PID 2>/dev/null || true
          exit $CODE

name: Internal Links
on:
  push:
    paths:
      - 'content/**'
      - 'scripts/validate-internal-links.mjs'
      - 'internal-links.config.json'
  pull_request:
    paths:
      - 'content/**'
      - 'scripts/validate-internal-links.mjs'
      - 'internal-links.config.json'
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/validate-internal-links.mjs

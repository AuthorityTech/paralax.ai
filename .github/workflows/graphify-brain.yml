name: Brain Sync

# Thin caller for the canonical reusable workflow in AuthorityTech/.github.
# Lane is this repo's BRAIN_LANE variable; the org-level GH_PAT is inherited.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    uses: AuthorityTech/.github/.github/workflows/graphify-brain.yml@main
    with:
      lane: ${{ vars.BRAIN_LANE }}
    secrets: inherit
